name = "optiline-systems-static"
type = "javascript"
account_id = ""
workers_dev = true
route = ""
zone_id = ""

[build]
command = "pnpm install && pnpm build"
cwd = "./"
watch_paths = ["client/src/**/*.tsx", "client/src/**/*.ts", "client/src/**/*.css"]

[build.upload]
format = "service-worker"

[env.production]
name = "optiline-systems-static-prod"
